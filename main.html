<!DOCTYPE html><html lang="en">
<head>
  <title>Dashboard</title>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:wght@600&family=Roboto:wght@500&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="todo.css">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="notes.css">
  <link rel="stylesheet" href="calculator.css">
  <link rel="stylesheet" href="saveUrls.css">
  <script src="todo.js" defer></script>
  <script src="main.js" defer></script>
  <script src="notes.js" defer></script>
  <script src="calculator.js" defer></script>
  <script src="saveUrls.js" defer></script>
  <link rel="icon" href="favicon-32x32.png" type="image/x-icon">
</head>
<body>

<header class="dashboard-header"> <h1>Dashboard</h1> </header>

<main class="all-dashboard-items">
  <button class="open-todo-wrap --opened-btn">TODO</button>
  <button class="open-notes-wrap --opened-btn">NOTES</button>
  <button class="open-calc-wrap --opened-btn">CALCULATOR</button>
  <button class="open-save-urls-wrap --opened-btn">SAVE URLS</button>
  <button class="open-settings-window">⚙️</button>
</main>

<div class="all-stats-wrap">
  <p class="todos-number-stats"></p>
  <p class="notes-symbols-number"></p>
  <p class="saved-urls-number"></p>
</div>
<button class="show-all-dashboard-stats">📊</button>

<!-- Todos -->
<div class="todo-wrap">
  <p data-todos-number>Todos: ...</p>
  <p todo-symbols-length>0/25</p>
  <header class="drag-and-drop-block"></header>
  <button class="save-all-todos --saved-btn">Save</button>
  <input type="text" data-todo-input placeholder="Your todo..." title="Add todo...">
  <input type="text" data-todo-search placeholder="Search todo..." title="Search todo...">
  <button data-add-todo title="Add todo...">Add</button>
  <div data-todos-container></div>

  <button data-close-todo-wrap>❌</button>
  <button class="min-wrap">▢</button>

  <button class="hide-completed-todos" title="Archive all completed todos">🗄️</button>
  <button class="toggle-hidden-todos-window" title="Show hidden todos">🗂️</button>
  <div class="hidden-todos-window">
    <h2>Hidden todos</h2>
    <hr>
    <button class="close-hidden-wind-btn">❌</button>
    <div class="hidden-todos-container"></div>
    <button class="unhide-todos">Unhide todos</button>
  </div>
</div>

<!-- Notes -->
<div class="notes-wrap">
  <h1>Notes</h1>
  <header class="drag-and-drop-block"></header>
  <button class="min-wrap">▢</button>
  <button class="close-notes-wrap">❌</button>
  <hr>

  <button class="--saved-btn btn-save_notes">Save</button>

  <div class="all-user-notes-container"></div>

  <button class="toggle-add-note-form" title="Ctrl + h">✚</button>
  <div class="add-notes-inputs">
    <input type="text" class="note-name-input" placeholder="Note name...">
    <input type="text" class="note-description-input" placeholder="Note description...">
    <button class="add-note-button">Add</button>
  </div>
</div>

<div class="notes-content-wrap">
  <button class="close-notes-content-wrap">❌</button>
  <h3></h3>
  <p class="notes-symbols-limit-text">_/1000</p>
  <div class="notes-user-content" contenteditable="true"></div>
</div>

<div class="delete-note-confirm">
  <p>Delete note?</p>
  <button>YES</button>
</div>

<!-- Calculator -->
<div class="calc-wrap">
  <header class="drag-and-drop-block"></header>
  <button class="close-calc-wrap">❌</button>
  <div class="calc-container">
    <div class="header-panel"><p></p></div>
    <button class="delete-symbol-btn">⌫</button>
    <div class="navigation-panel">
      <div class="numbers-panel">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value=".">.</button>
        <button data-value="0">0</button>
        <button data-value="=">=</button>
      </div>
      <div class="operators-panel">
        <button data-value="/">÷</button>
        <button data-value="*">×</button>
        <button data-value="-">-</button>
        <button data-value="+">+</button>
      </div>
    </div>
  </div>

  <button class="min-wrap">▢</button>
</div>

<!-- Urls -->
<div class="save-urls-wrap">
  <header class="drag-and-drop-block"></header>
  <button class="save-all-urls --saved-btn">Save</button>
  <button class="close-add-urls-wrap">❌</button>

  <input type="text" class="add-url-name-input" placeholder="Name your url...">
  <input type="text" class="add-opened-url-input" placeholder="Open url...">
  <button class="add-url-btn">Add</button>
  <input type="text" class="search-url" placeholder="Search your urls...">

  <div class="all-urls-container"></div>

  <button class="min-wrap">▢</button>
</div>

<!-- Settings -->
<div class="settings-window">
  <h1>Your settings</h1>
  <button class="close-settings-window">❌</button>
  <div class="settings-block">
    <p>Theme</p>
    <button data-theme-switcher></button>
  </div>

  <div class="settings-block">
    <p>Delete todos/urls animation(time)</p>
    <select class="animation-time-select">
      <option value="0s">0s</option>
      <option value="0.5s">0.5s</option>
      <option value="1s">1s</option>
      <option value="1.5s" selected>1.5s</option>
      <option value="2s">2s</option>
    </select>
  </div>

  <div class="settings-block">
    <p>Notes font size</p>
    <input type="number" class="notes-font-size-sett" placeholder="1.2" value="1.2" step="0.1">
  </div>

  <div class="settings-block">
    <p>Disabled all animation</p>
    <button class="disabled-animation-sett">✖️</button>
  </div>

  <div class="settings-block">
    <p>Confirm before delete</p>
    <button class="conf-before-del-sett">✖️</button>
  </div>
</div>

<!-- Sign-in account -->
<div class="sign-in-window">
  <h1>Sign-in</h1>
  <form class="sign-in-container">
    <p class="show-sign-in-error"></p>
    <label for="name">Your name</label>
    <input
    id="name"
    type="text"
    class="user-name-input"
    placeholder="Your name..."
    required
    minlength="3"
    maxlength="16"
    autocomplete="off"
    >

    <label for="password">Your password</label>
    <input
    id="password"
    type="password"
    class="user-password-input"
    placeholder="Your password..."
    required
    minlength="8"
    maxlength="16"
    autocomplete="off"
    >

    <button class="sign-in-btn" type="submit">Sign-in</button>
  </form>
</div>

<p class="show-response"></p>

</body>
</html>
